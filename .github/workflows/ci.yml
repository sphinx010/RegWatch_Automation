name: RegWatch Regression Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  regression-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Cypress Run & AI Enrichment
        run: npm run cypress:run:ai
        env:
          CYPRESS_REGWATCH_EMAIL: ${{ secrets.REGWATCH_EMAIL }}
          CYPRESS_REGWATCH_PASSWORD: ${{ secrets.REGWATCH_PASSWORD }}
          CYPRESS_HUGGINGFACE_API_TOKEN: ${{ secrets.HUGGINGFACE_API_TOKEN }}

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regwatch-test-reports
          path: |
            cypress/reports/html
            cypress/screenshots
            cypress/videos
          retention-days: 7
